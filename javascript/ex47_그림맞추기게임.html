<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그림 맞추기 게임</title>
    <style>
        table,
        td {
            border: 1px solid gray;
        }

        table {
            border-collapse: collapse;
        }
    </style>
</head>

<body>
    <!--
    * gameStart(this)
    *   this : select 태그
    -->
    <select id="level" onchange="gameStart(this)">
        <option value="2">EASY</option>
        <option value="4" selected="selected">NORMAL</option>
        <option value="6">HARD</option>
    </select>
    <div id="board"></div>
    <script>
        let level = 4;
        window.onload = function () {
            shuffle();
            editHtml();
            game();
        }
        let cnt = 0; // 전역 변수
        let model = null;
        function shuffle() { // model 배열의 내용을 섞기
            model = ["S_1.jpg", "S_1.jpg", "S_2.jpg", "S_2.jpg",
                "S_3.jpg", "S_3.jpg", "S_4.jpg", "S_4.jpg",
                "S_5.jpg", "S_5.jpg", "S_6.jpg", "S_6.jpg",
                "S_7.jpg", "S_7.jpg", "S_8.jpg", "S_8.jpg",
                "S_9.jpg", "S_9.jpg", "S_10.jpg", "S_10.jpg",
                "pic00.png", "pic00.png", "pic01.png", "pic01.png",
                "pic02.png", "pic02.png", "pic03.png", "pic03.png",
                "pic04.png", "pic04.png", "pic05.png", "pic05.png",
                "pic06.png", "pic06.png", "pic07.png", "pic07.png"
                // 36개의 이미지(18개의 이미지) : 6 * 6
            ];
            // 함수 내에서 let, var 없는 변수는 전역변수로 사용됨. 지역변수는 let, var 예약어를 사용해야 함
            cnt = level * level; // 화면에 출력할 이미지의 갯수 3 * 3 = 9, 4 * 4 = 16, 5 * 5 = 25
            for (let a = 0; a < 10000; a++) {
                let ran = Math.floor(Math.random() * cnt); // 0 ~ (cnt - 1) 의 임의의 수
                let tmp = model[0]; // 이미지 섞기
                model[0] = model[ran]; // 화면에 이미지 보여주기
                model[ran] = tmp;
            }
        }
        function editHtml() { // 이미지를 보여주기
            let board = "<table>";
            for (let i = 0; i < cnt; i++) {
                if ((i % level) == 0) board += "<tr>";
                board += `<td><img class='pic' id='pic${i}' src='./img/${model[i]}' width='100' height='100'></td>`
                if ((i % level) == (level - 1)) board += "</tr>";
            }
            document.querySelector("#board").innerHTML = `${board}</table>`;
        }
        function game() {
            // 2초 후에 function 실행
            setTimeout(() => {
                let pics = document.querySelectorAll(".pic"); // 이미지 전부. 배열
                pics.forEach(function (item) { // 이미지들 전부를 하나씩 순회하면서 function 함수 실행
                    // item : 이미지 1개
                    // opacity : 투명도 (1 : 불투명, 0 : 투명(이미지가 안보임))
                    item.setAttribute("style", "opacity:0.01");
                })
            }, 3000);
            let total = 0; // 클릭한 횟수
            let count = 0; // 클릭한 이미지가 1번째 또는 2번째 클릭인지 판단
            let success = 0; // 쌍인 이미지를 찾은 갯수. 이미지 개수 / 2 값인 경우 모든 이미지 찾기 성공
            let onePic = null; // 1번째 클릭된 이미지
            let twoPic = null; // 2번째 클릭된 이미지
            let pics = document.querySelectorAll(".pic"); //img 태그들
            for (let i = 0; i < pics.length; i++) {
                pics[i].onclick = function () { // 모든 이미지에 click 이벤트 등록
                    if (pics[i].getAttribute("class").indexOf("diePic") < 0) { // 쌍을 찾지 못한 이미지들인 경우 
                        total++; // 클릭한 횟수 증가
                        pics[i].setAttribute("style", "opacity:1"); // 이미지 보여주기. 불투명하게 설정
                        count++;
                        if (count == 1) { // 1번째 클릭된 이미지
                            onePic = pics[i]; // 1번째 이미지 onePick 변수에 저장
                            oneId = pics[i].getAttribute("id");
                        } else if (count == 2) { // 2번째 클릭된 이미지
                            twoPic = pics[i]; // 2번째 이미지 twoPick 변수에 저장
                            twoId = pics[i].getAttribute("id");
                            // if (onePic.src == twoPic.src && onePic != twoPic) { // 같은 이미지 찾기 성공
                            if (onePic.src == twoPic.src && oneId != twoId) { // 같은 이미지 찾기 성공
                                success++; // 성공 횟수 증가
                                onePic.setAttribute("class", "diePic"); // class 속성을 diePic 변경
                                twoPic.setAttribute("class", "diePic"); // class 속성을 diePic 변경
                                onePic.disable = true; // 클릭되지 않도록 disable 상태로 변경
                                twoPic.disable = true; // 클릭되지 않도록 disable 상태로 변경
                                if (success == cnt / 2) { // 모든 이미지 찾기 성공
                                    alert(total + "번 만에 성공. 게임을 종료합니다.")
                                    setTimeout(function () {
                                        if (confirm("게임을 계속하시겠습니까?")) {
                                            location.reload();
                                        }
                                    }, 2000);
                                }
                            } else { // 같은 이미지가 아닌 경우
                                setTimeout(function () {
                                    onePic.style.opacity = 0.01; // 이미지 투명으로 설정
                                    twoPic.style.opacity = 0.01; // 이미지 투명으로 설정
                                }, 500);
                            }
                            count = 0;
                        } else { // 실행되면 안돼는 영역
                            alert("프로그램 오류");
                        }
                    }
                }// 이미지 클릭 이벤트 끝
            } // for 구문의 끝
        }// game 함수의 끝
        function gameStart(value) {
            level = value.value;
            shuffle();
            editHtml();
            game();
        }
    </script>
</body>

</html>
